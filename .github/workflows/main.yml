name: Atualizar Plex EPG

on:
  schedule:
    # Agenda para rodar a cada 4 horas (minuto 0 da hora 0, 4, 8, 12, 16, 20)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Permite que você clique num botão e force a execução manual se quiser

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      # Dá permissão para a automação salvar o arquivo XML de volta no seu repositório
      contents: write

    steps:
    # 1. Copia o código do repositório para a máquina virtual
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Instala o Python na máquina virtual
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala a biblioteca requests que o script precisa
    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. Executa o script injetando o Token salvo nos Secrets do repositório
    - name: Executar Extrator de EPG
      env:
        PLEX_TOKEN: ${{ secrets.PLEX_TOKEN }}
      run: python Iniciar.py  # <-- SUBSTITUA "seu_script.py" pelo nome real do seu arquivo

    # 5. Sincroniza, faz o commit e atualiza o repositório remotamente de forma segura
    - name: Sincronizar, Commit e Push do XML alterado
      run: |
        # Configura as credenciais do Bot do GitHub
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Adiciona o novo arquivo XML gerado ao estágio de commit
        git add plex_br_epg.xml
        
        # Cria o commit. Se não houver mudanças no EPG, o "|| exit 0" encerra o passo com sucesso
        git commit -m "Auto: Atualização de EPG ✅" || exit 0
        
        # Sincroniza o estado atual buscando as atualizações mais recentes do servidor (Fetch)
        echo "Buscando alterações remotas..."
        git fetch origin main
        
        # Aplica um rebase para alinhar o seu commit local após qualquer modificação remota recente
        git pull --rebase origin main
        
        # Envia a atualização de volta para o repositório principal (Push)
        echo "Enviando atualizações para o GitHub..."
        git push origin main
        
